<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect — encode the full path into a query string
      // so index.html can restore it via history.replaceState
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1) + (l.search ? l.search : '')) +
        (l.hash || '')
      );
    </script>
  </head>
  <body></body>
</html>
